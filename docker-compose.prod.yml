services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/holidays
      - ENVIRONMENT=production
      - FRONTEND_URL=http://your-domain.com
      - CORS_ORIGINS=http://your-domain.com
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=holidays
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d holidays"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  backend_uploads:
  postgres_data:
